server {
    listen 80;
    server_name oculus.cesnet.cz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name oculus.cesnet.cz;

    ssl_certificate /etc/letsencrypt/live/oculus.cesnet.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oculus.cesnet.cz/privkey.pem;

    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://oculus_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Data
    location /data/ {
        alias /data/;
        autoindex off;
    }
}
