server {
    listen 80;
    server_name oculus.cesnet.cz;

    # HTTP -> HTTPS redirect
    return 301 https://$host$request_uri;

    # Serve ACME challenge for Certbot
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
}

server {
    listen 443 ssl;
    server_name oculus.cesnet.cz;

    ssl_certificate /etc/letsencrypt/live/oculus.cesnet.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oculus.cesnet.cz/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API redirect /api -> :8000
    location /api/ {
        proxy_pass http://oculus-backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Data
    location /processed/ {
        alias /data/processed/;
        autoindex off;
    }
}